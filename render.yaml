# Render Blueprint — deploys the Node API in backend/ as a free web service.
# Postgres is external (Neon via DATABASE_URL), so no database is defined here.
#
# Secret values are marked `sync: false`: Render prompts for them in the
# dashboard on first deploy, so they NEVER live in this public repo.
# Copy each value from backend/.env when prompted.
services:
  - type: web
    name: atsapplyexperts-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # ---- non-secret config (safe to keep in the repo) ----
      - key: NODE_VERSION
        value: "20"
      - key: APP_URL                       # frontend origin allowed by CORS
        value: https://wajidshaz.github.io
      - key: JWT_EXPIRES
        value: 7d
      - key: OPENROUTER_CHAT_MODEL
        value: google/gemma-4-31b-it:free
      - key: UPLOAD_DIR
        value: ./uploads
      - key: JOBSPY_ENABLED                # the Python service isn't deployed
        value: "false"
      # ---- secrets (entered in the Render dashboard, copy from backend/.env) ----
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CREDENTIAL_ENC_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GMAIL_SENDER
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REFRESH_TOKEN
        sync: false
      - key: GMAIL_REDIRECT_URI
        sync: false
